<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>userHonest</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg: #050505;
      --fg: #f5f5f5;
      --muted: rgba(255,255,255,0.58);
      --line: rgba(255,255,255,0.16);
      --glow: rgba(255,255,255,0.14);
    }

    body {
      position: relative;
      min-height: 100vh;
      overflow: hidden;
      background:
        radial-gradient(circle at 50% 22%, rgba(255,255,255,0.08), transparent 20%),
        radial-gradient(circle at 20% 80%, rgba(255,255,255,0.04), transparent 25%),
        radial-gradient(circle at 80% 75%, rgba(255,255,255,0.03), transparent 25%),
        linear-gradient(180deg, #020202 0%, #090909 100%);
      color: var(--fg);
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      position: relative;
    }

    body::before,
    body::after {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    body::before {
      background-image:
        linear-gradient(var(--line) 1px, transparent 1px),
        linear-gradient(90deg, var(--line) 1px, transparent 1px);
      background-size: 44px 44px;
      /* remove heavy masking to expose grid */
      opacity: 0.9;
    }

    body::after {
      background:
        linear-gradient(115deg, transparent 0 42%, rgba(255,255,255,0.04) 50%, transparent 58%),
        linear-gradient(295deg, transparent 0 45%, rgba(255,255,255,0.025) 50%, transparent 55%);
      filter: blur(12px);
      opacity: 0.7;
    }

    .glitch-bg {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 1;
      opacity: 0.6;
      mix-blend-mode: screen;
      background:
        linear-gradient(rgba(255,0,150,0.18), rgba(255,0,150,0.18)) 0% 0% / 40% 20% no-repeat,
        /* push green to extreme top-right */
        linear-gradient(rgba(0,255,180,0.2), rgba(0,255,180,0.2)) 98% 2% / 38% 26% no-repeat,
        linear-gradient(rgba(255,255,255,0.14), rgba(255,255,255,0.14)) 20% 50% / 50% 20% no-repeat,
        linear-gradient(rgba(255,0,150,0.14), rgba(255,0,150,0.14)) 10% 75% / 30% 15% no-repeat,
        /* push green to extreme bottom-left */
        linear-gradient(rgba(0,255,180,0.18), rgba(0,255,180,0.18)) 2% 98% / 40% 22% no-repeat;
    }

    @keyframes rectShift {
      0% {
        background-position:
          10% 20%,
          70% 30%,
          40% 70%,
          20% 60%,
          80% 75%;
      }
      50% {
        background-position:
          15% 25%,
          65% 35%,
          45% 65%,
          25% 55%,
          75% 70%;
      }
      100% {
        background-position:
          12% 22%,
          72% 28%,
          38% 72%,
          18% 62%,
          82% 78%;
      }
    }

    @keyframes glitchShift {
      0% { transform: translateX(0px); }
      50% { transform: translateX(2px); }
      100% { transform: translateX(-2px); }
    }

    @keyframes glitchMove {
      0% { transform: translateY(0px); }
      20% { transform: translateY(-2px); }
      40% { transform: translateY(1px); }
      60% { transform: translateY(-1px); }
      80% { transform: translateY(2px); }
      100% { transform: translateY(0px); }
    }

    .noise {
      position: absolute;
      inset: 0;
      opacity: 0.045;
      background-image:
        radial-gradient(circle at 20% 20%, white 0.7px, transparent 1px),
        radial-gradient(circle at 80% 30%, white 0.7px, transparent 1px),
        radial-gradient(circle at 40% 70%, white 0.7px, transparent 1px),
        radial-gradient(circle at 70% 80%, white 0.7px, transparent 1px);
      background-size: 120px 120px;
      pointer-events: none;
      mix-blend-mode: screen;
    }

    .frame {
      position: relative;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px;
    }

    .panel {
      z-index: 2;
      position: relative;
      width: min(1200px, 94vw);
      min-height: 68vh;
      border: 1px solid var(--line);
      background: linear-gradient(180deg, rgba(255,255,255,0.03), rgba(255,255,255,0.015));
      backdrop-filter: blur(6px);
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.02) inset,
        0 30px 80px rgba(0,0,0,0.55),
        0 0 120px rgba(255,255,255,0.04);
      overflow: hidden;
      border-radius: 24px;
    }

    .panel::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 50% 30%, var(--glow), transparent 30%),
        linear-gradient(180deg, transparent, rgba(255,255,255,0.025));
      pointer-events: none;
    }

    .topbar {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 56px;
      border-bottom: 1px solid var(--line);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      font-size: 0.8rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--muted);
      background: rgba(0,0,0,0.14);
    }

    

    .content {
      min-height: 68vh;
      display: grid;
      place-items: center;
      text-align: center;
      padding: 90px 32px 48px;
      position: relative;
    }

    .content::before,
    .content::after {
      content: "";
      position: absolute;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 999px;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
    }

    .content::before {
      width: min(620px, 70vw);
      height: min(620px, 70vw);
      opacity: 0.22;
    }

    .content::after {
      width: min(420px, 48vw);
      height: min(420px, 48vw);
      opacity: 0.12;
    }

    .hero {
      position: relative;
      z-index: 2;
      max-width: 900px;
    }

    

    h1 {
      font-size: clamp(3rem, 8vw, 7rem);
      line-height: 0.95;
      font-weight: 300;
      letter-spacing: 0.1em;
      text-transform: none;
      text-shadow: 0 0 30px rgba(255,255,255,0.06);
    }

    .subtitle {
      margin: 22px auto 0;
      max-width: 540px;
      font-size: clamp(1rem, 1.8vw, 1.15rem);
      line-height: 1.7;
      color: var(--muted);
    }

    .cta-row {
      margin-top: 38px;
      display: flex;
      justify-content: center;
      gap: 16px;
      flex-wrap: wrap;
    }

    .sub-link,
    .ghost {
      text-decoration: none;
      color: var(--fg);
      padding: 14px 22px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.12);
      transition: 180ms ease;
      letter-spacing: 0.04em;
      background: rgba(255,255,255,0.025);
    }

    .sub-link:hover,
    .ghost:hover {
      transform: translateY(-1px);
      background: rgba(255,255,255,0.06);
      border-color: rgba(255,255,255,0.22);
      box-shadow: 0 10px 40px rgba(255,255,255,0.05);
    }

    .footer-note {
      position: absolute;
      bottom: 22px;
      left: 24px;
      right: 24px;
      display: flex;
      justify-content: space-between;
      gap: 12px;
      color: rgba(255,255,255,0.36);
      font-size: 0.72rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }

    @media (max-width: 700px) {
      .panel {
        min-height: 78vh;
        border-radius: 18px;
      }

      .content {
        padding: 82px 20px 56px;
      }

      .footer-note {
        flex-direction: column;
        align-items: center;
        text-align: center;
      }
    }
  

    /* TYPE 2: static interference */
    .glitch-static {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 1;
      opacity: 0.25;
      background:
        repeating-linear-gradient(
          0deg,
          rgba(255,255,255,0.06) 0px,
          rgba(255,255,255,0.06) 1px,
          transparent 1px,
          transparent 3px
        );
      animation: staticFlicker 0.2s infinite steps(2);
    }

    @keyframes staticFlicker {
      0% { opacity: 0.15; }
      50% { opacity: 0.35; }
      100% { opacity: 0.15; }
    }

    /* TYPE 3: color bleed */
    .glitch-bleed {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 1;
      opacity: 0.2;
      mix-blend-mode: screen;
      background:
        radial-gradient(circle at 30% 50%, rgba(255,0,150,0.2), transparent 40%),
        radial-gradient(circle at 70% 50%, rgba(0,255,180,0.2), transparent 40%);
      animation: bleedMove 8s infinite linear;
    }

    @keyframes bleedMove {
      0% { transform: translateX(0px); }
      50% { transform: translateX(20px); }
      100% { transform: translateX(0px); }
    }

    /* TYPE 4: block corruption */
    .glitch-blocks {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 1;
      opacity: 0.15;
      background:
        repeating-linear-gradient(
          90deg,
          rgba(255,255,255,0.08) 0px,
          rgba(255,255,255,0.08) 4px,
          transparent 4px,
          transparent 40px
        );
      animation: blockShift 2s infinite steps(4);
    }

    @keyframes blockShift {
      0% { transform: translateX(0px); }
      25% { transform: translateX(-10px); }
      50% { transform: translateX(5px); }
      75% { transform: translateX(-3px); }
      100% { transform: translateX(0px); }
    }



    /* TYPE 5: sliced horizontal glitches */
    .glitch-slices {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 1;
      opacity: 0.35;
      mix-blend-mode: screen;
      background:
        linear-gradient(rgba(255,255,255,0.15), rgba(255,255,255,0.15)) 0 20% / 100% 6px no-repeat,
        linear-gradient(rgba(255,0,150,0.18), rgba(255,0,150,0.18)) 0 40% / 100% 10px no-repeat,
        linear-gradient(rgba(0,255,180,0.18), rgba(0,255,180,0.18)) 0 65% / 100% 8px no-repeat;
      animation: sliceShift 2.5s infinite ease-in-out;
    }

    @keyframes sliceShift {
      0% { transform: translateX(0); }
      30% { transform: translateX(-8px); }
      60% { transform: translateX(6px); }
      100% { transform: translateX(0); }
    }

    /* TYPE 6: vertical tearing */
    .glitch-tear {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 1;
      opacity: 0.3;
      background:
        linear-gradient(90deg, rgba(255,255,255,0.12), transparent 20%) 10% 0 / 40px 100% no-repeat,
        linear-gradient(90deg, rgba(0,255,180,0.15), transparent 20%) 60% 0 / 60px 100% no-repeat;
      animation: tearShift 3s infinite ease-in-out;
    }

    @keyframes tearShift {
      0% { background-position: 10% 0, 60% 0; }
      50% { background-position: 14% 0, 55% 0; }
      100% { background-position: 10% 0, 60% 0; }
    }

    /* TYPE 7: random block flashes */
    .glitch-flash {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 1;
      opacity: 0.2;
      background:
        linear-gradient(rgba(255,255,255,0.2), rgba(255,255,255,0.2)) 30% 40% / 80px 40px no-repeat,
        linear-gradient(rgba(255,0,150,0.2), rgba(255,0,150,0.2)) 70% 20% / 60px 30px no-repeat;
      animation: flashJitter 1.2s infinite steps(2);
    }

    @keyframes flashJitter {
      0% { opacity: 0.1; }
      50% { opacity: 0.4; }
      100% { opacity: 0.1; }
    }



    /* TYPE 8: abstract layered shards */
    .glitch-shards {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 1;
      opacity: 0.5;
      mix-blend-mode: screen;
      background:
        linear-gradient(120deg, rgba(255,0,150,0.22), transparent 60%) 0% 20% / 50% 40% no-repeat,
        linear-gradient(300deg, rgba(0,255,180,0.22), transparent 60%) 85% 10% / 45% 40% no-repeat,
        linear-gradient(200deg, rgba(255,255,255,0.16), transparent 70%) 10% 60% / 60% 40% no-repeat;
    }

    @keyframes shardDrift {
      0% {
        background-position:
          15% 30%,
          70% 40%,
          40% 70%,
          80% 20%;
      }
      50% {
        background-position:
          20% 35%,
          65% 45%,
          45% 65%,
          75% 25%;
      }
      100% {
        background-position:
          12% 28%,
          72% 38%,
          38% 72%,
          82% 18%;
      }
    }

    /* TYPE 9: chaotic micro fragments */
    .glitch-fragments {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 1;
      opacity: 0.4;
      background:
        linear-gradient(rgba(255,255,255,0.18), rgba(255,255,255,0.18)) 5% 10% / 20% 8% no-repeat,
        linear-gradient(rgba(255,0,150,0.18), rgba(255,0,150,0.18)) 40% 40% / 25% 10% no-repeat,
        linear-gradient(rgba(0,255,180,0.18), rgba(0,255,180,0.18)) 70% 20% / 20% 8% no-repeat,
        linear-gradient(rgba(255,255,255,0.18), rgba(255,255,255,0.18)) 60% 75% / 25% 10% no-repeat;
    }

    @keyframes fragmentJitter {
      0% { transform: translate(0,0); }
      50% { transform: translate(4px,-3px); }
      100% { transform: translate(-3px,2px); }
    }

    /* TYPE 10: diagonal interference waves */
    .glitch-diagonal {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 1;
      opacity: 0.25;
      mix-blend-mode: screen;
      background:
        repeating-linear-gradient(
          45deg,
          rgba(255,0,150,0.12) 0px,
          rgba(255,0,150,0.12) 2px,
          transparent 2px,
          transparent 12px
        ),
        repeating-linear-gradient(
          -45deg,
          rgba(0,255,180,0.12) 0px,
          rgba(0,255,180,0.12) 2px,
          transparent 2px,
          transparent 14px
        );
      animation: diagShift 4s infinite linear;
    }

    @keyframes diagShift {
      0% { transform: translateX(0); }
      50% { transform: translateX(10px); }
      100% { transform: translateX(0); }
    }

</style>
</head>
<body>
  <div class="glitch-bg"></div>
  <div class="glitch-shards"></div>
  <div class="glitch-fragments"></div>
  <div class="noise"></div>

  <main class="frame">
    <section class="panel">
      <div class="topbar">
        
        <div>index / userHonest</div>
      </div>

      <div class="content">
        <div class="hero">
          
          <h1>userHonest</h1>
          <p class="subtitle">
            A page dedicated to malware research, CTF writeups, and general cybersecurity topics. Notes, techniques, and solutions collected from hands-on analysis.
          </p>
          <div class="cta-row">
            <a class="ghost" href="#">Malware Research</a>
            <a class="sub-link" href="/docs/writeups.html">CTF Writeups</a>
          </div>
        </div>
      </div>

      <div class="footer-note">
        <span></span>
        <span></span>
      </div>
    </section>
  </main>
</body>
</html>
